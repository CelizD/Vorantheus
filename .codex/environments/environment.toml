version = 1
name = "vorantheus-local"

[setup]
script = '''
Set-Location $env:CODEX_WORKTREE_PATH

node -v
npm -v

if (Test-Path package-lock.json) {
  npm ci
} else {
  npm install
}

npm run build --if-present
'''

[cleanup]
script = '''
Set-Location $env:CODEX_WORKTREE_PATH

Remove-Item -Recurse -Force node_modules, .next, dist, build, .cache, tmp -ErrorAction SilentlyContinue
'''

[[actions]]
